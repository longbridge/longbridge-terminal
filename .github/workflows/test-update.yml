name: Test Update Command

on:
  push:
    branches:
      - main
    paths:
      - src/update.rs
      - install
      - install.ps1
      - .github/workflows/test-update.yml
  pull_request:
    paths:
      - src/update.rs
      - install
      - install.ps1
      - .github/workflows/test-update.yml
  workflow_dispatch:

concurrency:
  group: test-update-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  update-linux:
    name: Update (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: linux-update-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Force old version to trigger update
        run: sed -i 's/^version = ".*"/version = "0.14.0"/' Cargo.toml

      - name: Build
        run: cargo build

      - name: Test --release-notes flag fetches content
        run: |
          output=$(cargo run -- update --release-notes 2>&1)
          echo "$output"
          [ -n "$output" ] || { echo "FAIL: --release-notes returned empty output"; exit 1; }

      - name: Test first-run version detection
        run: |
          # Write a fake old version to trigger release notes on next run
          mkdir -p ~/.longbridge
          echo "0.0.1" > ~/.longbridge/.terminal-last-run-version
          # Run with no subcommand (prints help, no auth needed) and capture output
          output=$(cargo run 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "Release notes" || { echo "FAIL: release notes not shown after version change"; exit 1; }
          # Verify marker was updated so it won't show again
          version=$(cat ~/.longbridge/.terminal-last-run-version)
          [ "$version" = "0.14.0" ] || { echo "FAIL: last-run-version not updated (got: $version)"; exit 1; }

      - name: Test release notes not shown on subsequent run
        run: |
          output=$(cargo run 2>&1 || true)
          echo "$output"
          if echo "$output" | grep -q "Release notes"; then
            echo "FAIL: release notes shown again on second run"
            exit 1
          fi

      - name: Run update
        run: cargo run -- update --verbose

      - name: Verify updated binary matches CDN latest
        run: |
          expected=$(curl -sf https://open.longbridge.com/github/release/longbridge-terminal/latest | tr -d '[:space:]')
          actual=$(target/debug/longbridge --version | awk '{print $2}')
          echo "CDN latest: $expected"
          echo "Binary version: $actual"
          [ "v$actual" = "$expected" ] || [ "$actual" = "$expected" ]

  update-macos:
    name: Update (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: macos-update-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Force old version to trigger update
        run: sed -i '' 's/^version = ".*"/version = "0.14.0"/' Cargo.toml

      - name: Build
        run: cargo build

      - name: Test --release-notes flag fetches content
        run: |
          output=$(cargo run -- update --release-notes 2>&1)
          echo "$output"
          [ -n "$output" ] || { echo "FAIL: --release-notes returned empty output"; exit 1; }

      - name: Test first-run version detection
        run: |
          mkdir -p ~/.longbridge
          echo "0.0.1" > ~/.longbridge/.terminal-last-run-version
          output=$(cargo run 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "Release notes" || { echo "FAIL: release notes not shown after version change"; exit 1; }
          version=$(cat ~/.longbridge/.terminal-last-run-version)
          [ "$version" = "0.14.0" ] || { echo "FAIL: last-run-version not updated (got: $version)"; exit 1; }

      - name: Test release notes not shown on subsequent run
        run: |
          output=$(cargo run 2>&1 || true)
          echo "$output"
          if echo "$output" | grep -q "Release notes"; then
            echo "FAIL: release notes shown again on second run"
            exit 1
          fi

      - name: Run update
        run: cargo run -- update --verbose

      - name: Verify updated binary matches CDN latest
        run: |
          expected=$(curl -sf https://open.longbridge.com/github/release/longbridge-terminal/latest | tr -d '[:space:]')
          actual=$(target/debug/longbridge --version | awk '{print $2}')
          echo "CDN latest: $expected"
          echo "Binary version: $actual"
          [ "v$actual" = "$expected" ] || [ "$actual" = "$expected" ]

  update-windows:
    name: Update (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: windows-update-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Force old version to trigger update
        shell: pwsh
        run: (Get-Content Cargo.toml) -replace '^version = ".*"', 'version = "0.14.0"' | Set-Content Cargo.toml

      - name: Build
        run: cargo build

      - name: Test --release-notes flag fetches content
        shell: pwsh
        run: |
          $output = cargo run -- update --release-notes 2>&1 | Out-String
          Write-Host $output
          if ([string]::IsNullOrWhiteSpace($output)) {
            throw "FAIL: --release-notes returned empty output"
          }

      - name: Test first-run version detection
        shell: pwsh
        run: |
          $dir = "$env:USERPROFILE\.longbridge"
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          Set-Content -Path "$dir\.terminal-last-run-version" -Value "0.0.1" -NoNewline
          $output = cargo run 2>&1 | Out-String
          Write-Host $output
          if ($output -notmatch "Release notes") {
            throw "FAIL: release notes not shown after version change"
          }
          $version = (Get-Content "$dir\.terminal-last-run-version").Trim()
          if ($version -ne "0.14.0") {
            throw "FAIL: last-run-version not updated (got: $version)"
          }

      - name: Test release notes not shown on subsequent run
        shell: pwsh
        run: |
          $output = cargo run 2>&1 | Out-String
          Write-Host $output
          if ($output -match "Release notes") {
            throw "FAIL: release notes shown again on second run"
          }

      - name: Run update
        shell: pwsh
        run: cargo run -- update

      - name: Verify updated binary matches CDN latest
        shell: pwsh
        run: |
          $expected = (Invoke-WebRequest -Uri "https://open.longbridge.com/github/release/longbridge-terminal/latest" -UseBasicParsing).Content.Trim()
          $actual = (& target\debug\longbridge.exe --version) -replace '^longbridge ', ''
          Write-Host "CDN latest: $expected"
          Write-Host "Binary version: $actual"
          if ("v$actual" -ne $expected -and $actual -ne $expected) {
            throw "Version mismatch: binary=$actual, CDN=$expected"
          }
