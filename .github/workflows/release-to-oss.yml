name: Release to OSS

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.8.0). Leave empty to use the latest release."
        required: false
        type: string

permissions:
  contents: read

jobs:
  oss_backup:
    name: Sync release to OSS (manual)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name')
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Release: $TAG"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p release-dist
          gh release download "${{ steps.release.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --dir release-dist
          ls -lha release-dist/

      - name: Setup ossutil
        run: |
          wget -q https://github.com/aliyun/ossutil/releases/download/v1.7.17/ossutil-v1.7.17-linux-amd64.zip
          unzip -q ossutil-v1.7.17-linux-amd64.zip
          cp ./ossutil-v1.7.17-linux-amd64/ossutil . && chmod +x ./ossutil

      - name: Upload to OSS
        run: |
          set -euo pipefail
          ./ossutil cp ./release-dist/ \
            oss://lb-assets/github/release/longbridge-terminal/v${{ steps.release.outputs.version }}/ \
            -u -r -j 10 \
            -e oss-cn-hangzhou.aliyuncs.com \
            -i ${{ secrets.FE_LB_ASSET_ACCESS_KEY_ID }} \
            -k ${{ secrets.FE_LB_ASSET_ACCESS_KEY_SECRET }}

      - name: Update latest version file
        run: |
          set -euo pipefail
          echo "${{ steps.release.outputs.tag }}" > latest
          ./ossutil cp latest \
            oss://lb-assets/github/release/longbridge-terminal/latest \
            -f \
            -e oss-cn-hangzhou.aliyuncs.com \
            -i ${{ secrets.FE_LB_ASSET_ACCESS_KEY_ID }} \
            -k ${{ secrets.FE_LB_ASSET_ACCESS_KEY_SECRET }} \
            --meta "Cache-Control:no-cache#Content-Type:text/plain;charset=utf-8"

      - name: Upload scoop manifest to OSS
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          export ZIP_PATH="release-dist/longbridge-terminal-windows-amd64.zip"
          export SCOOP_URL="https://open.longbridge.cn/github/release/longbridge-terminal/v${VERSION}/longbridge-terminal-windows-amd64.zip"
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          manifest_path = Path(".scoop/longbridge.json")
          output_path = Path("longbridge.json")
          zip_path = Path(os.environ["ZIP_PATH"])
          version = os.environ["VERSION"]
          scoop_url = os.environ["SCOOP_URL"]

          sha256_hash = hashlib.sha256()
          with zip_path.open("rb") as f:
              for chunk in iter(lambda: f.read(1024 * 1024), b""):
                  sha256_hash.update(chunk)
          sha256 = sha256_hash.hexdigest()

          with manifest_path.open("r", encoding="utf-8") as f:
              manifest = json.load(f)

          manifest["version"] = version
          manifest.setdefault("architecture", {}).setdefault("64bit", {})
          manifest["architecture"]["64bit"]["url"] = scoop_url
          manifest["architecture"]["64bit"]["hash"] = sha256

          with output_path.open("w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)
              f.write("\n")
          PY
          ./ossutil cp longbridge.json \
            oss://lb-assets/github/release/longbridge-terminal/longbridge.json \
            -f \
            -e oss-cn-hangzhou.aliyuncs.com \
            -i ${{ secrets.FE_LB_ASSET_ACCESS_KEY_ID }} \
            -k ${{ secrets.FE_LB_ASSET_ACCESS_KEY_SECRET }} \
            --meta "Cache-Control:no-cache#Content-Type:application/json;charset=utf-8"
